# docker-compose.yml
# Stack TrackBoard : DB + backend FastAPI + frontend Next.js.
# Le reverse proxy HTTPS est gere PAR LE HOST (nginx ou Caddy installe sur la machine,
# pas dans le compose). Les containers exposent leurs ports sur 127.0.0.1 uniquement,
# le reverse proxy host les proxifie ensuite vers les sous-domaines publics.
#
# Routing typique cote nginx/caddy host :
#   https://dash.${DOMAIN}/  -> 127.0.0.1:3000  (frontend Next.js)
#   https://api.${DOMAIN}/   -> 127.0.0.1:8000  (backend FastAPI + WebSocket)
#
# Usage :
#   docker compose up -d
#   docker compose logs -f
#   docker compose build --no-cache frontend

services:
  # ===========================================
  # DATABASE - PostgreSQL
  # ===========================================
  db:
    image: postgres:16-alpine
    container_name: trackboard-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trackboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-trackboard}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trackboard}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # BACKEND - FastAPI
  # ===========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trackboard-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_EXPIRE_HOURS=${JWT_EXPIRE_HOURS:-24}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - HW_AGENT_TOKEN=${HW_AGENT_TOKEN}
      - SCRAPE_INTERVAL=${SCRAPE_INTERVAL:-3600}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - DOMAIN=${DOMAIN:-example.com}
      # Tracker credentials
      - GF_USER=${GF_USER}
      - GF_PASS=${GF_PASS}
      - GF_USERNAME=${GF_USERNAME}
      - TOS_USER=${TOS_USER}
      - TOS_PASS=${TOS_PASS}
      - TOS_USERNAME=${TOS_USERNAME}
      - TORR9_USER=${TORR9_USER}
      - TORR9_PASS=${TORR9_PASS}
      - TORR9_USERNAME=${TORR9_USERNAME}
      - GEMINI_USER=${GEMINI_USER}
      - GEMINI_PASS=${GEMINI_PASS}
      - GEMINI_USERNAME=${GEMINI_USERNAME}
      # Media services
      - MEDIA_PLEX_URL=${MEDIA_PLEX_URL}
      - MEDIA_PLEX_TOKEN=${MEDIA_PLEX_TOKEN}
      - MEDIA_RADARR_URL=${MEDIA_RADARR_URL}
      - MEDIA_RADARR_API_KEY=${MEDIA_RADARR_API_KEY}
      - MEDIA_SONARR_URL=${MEDIA_SONARR_URL}
      - MEDIA_SONARR_API_KEY=${MEDIA_SONARR_API_KEY}
      - MEDIA_TAUTULLI_URL=${MEDIA_TAUTULLI_URL}
      - MEDIA_TAUTULLI_API_KEY=${MEDIA_TAUTULLI_API_KEY}
    volumes:
      - cookies-data:/app/cookies
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ===========================================
  # FRONTEND - Next.js
  # ===========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # URL du backend appelee depuis le navigateur (figee au build de Next).
        # Pour le multi-origin standard : https://api.${DOMAIN}
        # Pour same-origin (un seul vhost qui route /api -> backend) : laisser vide.
        - NEXT_PUBLIC_API_URL=https://api.${DOMAIN:-example.com}
        - NEXT_PUBLIC_TRACKER_USERNAME=${TRACKER_USERNAME:-}
    container_name: trackboard-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend

volumes:
  postgres-data:
  cookies-data:
