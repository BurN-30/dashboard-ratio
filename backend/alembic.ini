[alembic]
# Repertoire des scripts de migration
script_location = alembic

# Permet a alembic d'importer les modules de l'app
prepend_sys_path = .

# Format des fichiers de migration : YYYYMMDD_HHMM_<rev>_<slug>.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Separateur de chemin des versions
version_path_separator = os

# L'URL est resolue dynamiquement par env.py depuis app.config.get_settings()
sqlalchemy.url = postgresql+asyncpg://override_via_env_py


[post_write_hooks]
# Pas de formatter automatique pour l'instant

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
