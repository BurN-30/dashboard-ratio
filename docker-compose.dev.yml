# docker-compose.dev.yml
# Stack DEV LOCALE : DB + backend avec hot reload, sans Caddy, sans HTTPS.
# Le frontend Next.js est lance separement avec `npm run dev` (port 3000).
# Le backend ecoute en clair sur localhost:8000.

services:
  # ===========================================
  # DATABASE - PostgreSQL
  # ===========================================
  db:
    image: postgres:16-alpine
    container_name: trackboard-db-dev
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: trackboard
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: trackboard
    volumes:
      - postgres-data-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trackboard"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ===========================================
  # BACKEND - FastAPI (dev mode avec hot reload)
  # ===========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: trackboard-backend-dev
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://trackboard:devpassword@db:5432/trackboard
      - JWT_SECRET=dev-secret-key-min-32-chars-not-for-production
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRE_HOURS=24
      - ADMIN_PASSWORD=admin
      - HW_AGENT_TOKEN=dev-hw-token
      - SCRAPE_INTERVAL=3600
    volumes:
      - ./backend/app:/app/app:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres-data-dev:

